name: Build and Release Expenzo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------------------------------
      # Frontend Vue
      # -------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Create frontend env
        working-directory: frontend
        shell: pwsh
        run: |
          Copy-Item .env.example .env

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend to Electron resources
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force desktop/resources/frontend -ErrorAction SilentlyContinue
          New-Item -ItemType Directory desktop/resources/frontend -Force

          Copy-Item frontend/dist/* desktop/resources/frontend -Recurse

      # -------------------------------
      # Backend Django
      # -------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install -r requirements.txt
          pip install pyarmor pyinstaller

      - name: Obfuscate backend
        working-directory: backend
        shell: pwsh
        run: |
          .venv\Scripts\activate

          pyarmor gen `
            -O .pyarmor_dist `
            server.py `
            accounts `
            config `
            expenses `
            tenants

      - name: Create backend env
        working-directory: backend
        shell: pwsh
        run: |
          Copy-Item .env.example .env
          Add-Content .env "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}"
          Add-Content .env "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"

      - name: Build backend executable
        working-directory: backend
        shell: pwsh
        run: |
          .venv\Scripts\activate
          pyinstaller expense-server.spec

      - name: Copy backend to Electron resources
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force desktop/resources/backend -ErrorAction SilentlyContinue
          New-Item -ItemType Directory desktop/resources/backend -Force

          Copy-Item backend/dist/expense-server.exe desktop/resources/backend/

      # -------------------------------
      # Electron
      # -------------------------------

      - name: Install Electron dependencies
        working-directory: desktop
        run: |
          npm ci

      # [Étape Optionnelle Intégrée] : Injection de la signature Azure Trusted Signing
      # Cette étape s'activera UNIQUEMENT le jour où vous achèterez l'abonnement et configurerez les secrets.
      # En attendant, elle est ignorée en toute sécurité.
      # - name: Setup Azure Trusted Signing
      #   uses: azure/trusted-signing-action@v0.5.1
      #   with:
      #     azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint: https://azuretrustedsigning.com
      #     code-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
      #     certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}

      - name: Build Electron installer
        working-directory: desktop
        env:
          LICENSE_PUBLIC_KEY: ${{ secrets.LICENSE_PUBLIC_KEY }} 
        run: |
          npm run build


      # -------------------------------
      # GitHub Release
      # -------------------------------

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/Expenzo Setup *.exe
            desktop/release/latest.yml
